name: CI Pipeline

on:
  push:
    branches: [ "main" ]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout code
      uses: actions/checkout@v3

    - name: Configure AWS Credentials
      uses: aws-actions/configure-aws-credentials@v2
      with:
        aws-access-key-id: AKIA6NRJOYUKF5KSJHP4
        aws-secret-access-key: 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
        aws-region: us-east-1   # ✅ hardcoded

    - name: Build Docker image
      run: docker build -t user-service ./microservices/user-service

    - name: Login to ECR
      run: |
        aws ecr get-login-password --region us-east-1 |   # ✅ hardcoded
        docker login --username AWS --password-stdin ${{ secrets.ECR_URI }}

    - name: Tag image
      run: |
        docker tag user-service:latest ${{ secrets.ECR_URI }}/user-service:latest

    - name: Push image
      run: |
        docker push ${{ secrets.ECR_URI }}/user-service:latest
